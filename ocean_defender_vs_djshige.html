// ========== AUDIO ENGINE ==========
class AudioEngine {
  constructor() { this.ctx = null; this.bgmNode = null; this.warnOsc = null; this.warnGain = null; this.warningActive = false; }

  init() {
    if (this.ctx) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    this.master = this.ctx.createGain(); this.master.gain.value = 0.5; this.master.connect(this.ctx.destination);
  }

  resume() { if (this.ctx && this.ctx.state === "suspended") this.ctx.resume(); }

  _noise(dur) {
    const sr = this.ctx.sampleRate, len = sr * dur, buf = this.ctx.createBuffer(1, len, sr), d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
    return buf;
  }

  // BGM: Ocean waves - looping filtered noise
  startBGM() {
    if (!this.ctx || this.bgmNode) return;
    const buf = this._noise(4);
    const src = this.ctx.createBufferSource(); src.buffer = buf; src.loop = true;
    const lp = this.ctx.createBiquadFilter(); lp.type = "lowpass"; lp.frequency.value = 400;
    const g = this.ctx.createGain(); g.gain.value = 0.12;
    // Slow amplitude modulation for wave feel
    const lfo = this.ctx.createOscillator(); lfo.type = "sine"; lfo.frequency.value = 0.15;
    const lfoG = this.ctx.createGain(); lfoG.gain.value = 0.06;
    lfo.connect(lfoG); lfoG.connect(g.gain);
    src.connect(lp); lp.connect(g); g.connect(this.master);
    src.start(); lfo.start();
    this.bgmNode = { src, lfo };
  }

  stopBGM() {
    if (this.bgmNode) { try { this.bgmNode.src.stop(); this.bgmNode.lfo.stop(); } catch(e){} this.bgmNode = null; }
  }

  // SE: Splash - nira dumped
  playSplash() {
    if (!this.ctx) return;
    const t = this.ctx.currentTime;
    const buf = this._noise(0.3);
    const src = this.ctx.createBufferSource(); src.buffer = buf;
    const bp = this.ctx.createBiquadFilter(); bp.type = "bandpass"; bp.frequency.value = 800; bp.Q.value = 1;
    const g = this.ctx.createGain(); g.gain.setValueAtTime(0.25, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
    src.connect(bp); bp.connect(g); g.connect(this.master); src.start(t); src.stop(t + 0.3);
  }

  // SE: Dramatic cutscene hit
  playCutscene() {
    if (!this.ctx) return;
    const t = this.ctx.currentTime;
    // Deep impact
    const o1 = this.ctx.createOscillator(); o1.type = "sine"; o1.frequency.setValueAtTime(80, t); o1.frequency.exponentialRampToValueAtTime(30, t + 0.8);
    const g1 = this.ctx.createGain(); g1.gain.setValueAtTime(0.5, t); g1.gain.exponentialRampToValueAtTime(0.001, t + 1.2);
    o1.connect(g1); g1.connect(this.master); o1.start(t); o1.stop(t + 1.2);
    // Rising tone
    const o2 = this.ctx.createOscillator(); o2.type = "sawtooth"; o2.frequency.setValueAtTime(200, t + 0.1); o2.frequency.exponentialRampToValueAtTime(600, t + 0.8);
    const g2 = this.ctx.createGain(); g2.gain.setValueAtTime(0.0001, t + 0.1); g2.gain.exponentialRampToValueAtTime(0.15, t + 0.5); g2.gain.exponentialRampToValueAtTime(0.001, t + 1.0);
    o2.connect(g2); g2.connect(this.master); o2.start(t + 0.1); o2.stop(t + 1.0);
    // Noise burst
    const buf = this._noise(0.5); const ns = this.ctx.createBufferSource(); ns.buffer = buf;
    const ng = this.ctx.createGain(); ng.gain.setValueAtTime(0.3, t); ng.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
    ns.connect(ng); ng.connect(this.master); ns.start(t); ns.stop(t + 0.5);
  }

  // SE: Book hits enemy
  playBookHit() {
    if (!this.ctx) return;
    const t = this.ctx.currentTime;
    const o = this.ctx.createOscillator(); o.type = "square"; o.frequency.setValueAtTime(300, t); o.frequency.exponentialRampToValueAtTime(100, t + 0.08);
    const g = this.ctx.createGain(); g.gain.setValueAtTime(0.2, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
    o.connect(g); g.connect(this.master); o.start(t); o.stop(t + 0.1);
  }

  // SE: Book hits ground
  playBookGround() {
    if (!this.ctx) return;
    const t = this.ctx.currentTime;
    const o = this.ctx.createOscillator(); o.type = "sine"; o.frequency.setValueAtTime(150, t); o.frequency.exponentialRampToValueAtTime(60, t + 0.12);
    const g = this.ctx.createGain(); g.gain.setValueAtTime(0.1, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
    o.connect(g); g.connect(this.master); o.start(t); o.stop(t + 0.15);
  }

  // SE: Game clear - triumphant arpeggio
  playWin() {
    if (!this.ctx) return;
    const t = this.ctx.currentTime;
    [523, 659, 784, 1047].forEach((freq, i) => {
      const o = this.ctx.createOscillator(); o.type = "sine"; o.frequency.value = freq;
      const g = this.ctx.createGain(); g.gain.setValueAtTime(0.0001, t + i * 0.15); g.gain.exponentialRampToValueAtTime(0.2, t + i * 0.15 + 0.05); g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.15 + 0.5);
      o.connect(g); g.connect(this.master); o.start(t + i * 0.15); o.stop(t + i * 0.15 + 0.5);
    });
  }

  // SE: Game over - descending sad tone
  playGameOver() {
    if (!this.ctx) return;
    const t = this.ctx.currentTime;
    [400, 350, 300, 200].forEach((freq, i) => {
      const o = this.ctx.createOscillator(); o.type = "triangle"; o.frequency.value = freq;
      const g = this.ctx.createGain(); g.gain.setValueAtTime(0.0001, t + i * 0.25); g.gain.exponentialRampToValueAtTime(0.15, t + i * 0.25 + 0.05); g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.25 + 0.4);
      o.connect(g); g.connect(this.master); o.start(t + i * 0.25); o.stop(t + i * 0.25 + 0.5);
    });
  }

  // SE: Warning alarm (continuous pulsing)
  startWarning() {
    if (!this.ctx || this.warningActive) return;
    this.warningActive = true;
    const t = this.ctx.currentTime;
    this.warnOsc = this.ctx.createOscillator(); this.warnOsc.type = "square"; this.warnOsc.frequency.value = 880;
    this.warnGain = this.ctx.createGain(); this.warnGain.gain.value = 0;
    const lfo = this.ctx.createOscillator(); lfo.frequency.value = 4;
    const lfoG = this.ctx.createGain(); lfoG.gain.value = 0.06;
    lfo.connect(lfoG); lfoG.connect(this.warnGain.gain);
    this.warnOsc.connect(this.warnGain); this.warnGain.connect(this.master);
    this.warnOsc.start(); lfo.start();
    this.warnLfo = lfo;
  }

  stopWarning() {
    if (!this.warningActive) return;
    this.warningActive = false;
    try { this.warnOsc.stop(); this.warnLfo.stop(); } catch(e){}
    this.warnOsc = null; this.warnGain = null; this.warnLfo = null;
  }
}
const audioEngine = new AudioEngine();

function Game() {
  const canvasRef = useRef(null);
  const state = useRef(GS.TITLE);
  const keys = useRef({});
  const player = useRef({ x: CW / 2 });
  const bullets = useRef([]);
  const enemies = useRef([]);
  const niraPieces = useRef([]); // falling nira visuals
  const oceanNira = useRef([]); // nira floating in ocean
  const nira = useRef(0);
  const defeated = useRef(0);
  const spawnT = useRef(0);
  const frame = useRef(0);
  const cutT = useRef(0);
  const boss = useRef(null);
  const paused = useRef(false);
  const raf = useRef(null);
  const imgs = useRef({ n: null, b: null, nira: null });
  const [, fu] = useState(0);

  useEffect(() => {
    const ld = (s) => new Promise(r => { const i = new Image(); i.onload = () => r(i); i.src = s; });
    Promise.all([ld(NORMAL_IMG), ld(BOSS_IMG), ld(NIRA_IMG), ld(BULLET_IMG), ld(TITLE_IMG)]).then(([n, b, ni, bul, ttl]) => {
      imgs.current = { n, b, nira: ni, bullet: bul, title: ttl };
      fu(v => v + 1);
    });
  }, []);

  const reset = useCallback(() => {
    player.current = { x: CW / 2 };
    bullets.current = [];
    enemies.current = [];
    niraPieces.current = [];
    oceanNira.current = [];
    nira.current = 0;
    defeated.current = 0;
    spawnT.current = 0;
    frame.current = 0;
    cutT.current = 0;
    boss.current = null;
    paused.current = false;
  }, []);

  const start = useCallback(() => { reset(); state.current = GS.PLAY; fu(v => v + 1); }, [reset]);

  useEffect(() => {
    const kd = (e) => {
      keys.current[e.key] = true;
      audioEngine.init(); audioEngine.resume();
      if ([" ", "ArrowLeft", "ArrowRight", "p", "P"].includes(e.key)) e.preventDefault();
      if (state.current === GS.TITLE && e.key === "Enter") { start(); audioEngine.startBGM(); }
      if ((state.current === GS.OVER || state.current === GS.WIN) && e.key === "Enter") {
        state.current = GS.TITLE; audioEngine.stopWarning(); fu(v => v + 1);
      }
      if ((e.key === "p" || e.key === "P") && (state.current === GS.PLAY || state.current === GS.BOSS)) {
        paused.current = !paused.current;
      }
    };
    const ku = (e) => { keys.current[e.key] = false; };
    window.addEventListener("keydown", kd);
    window.addEventListener("keyup", ku);
    return () => { window.removeEventListener("keydown", kd); window.removeEventListener("keyup", ku); };
  }, [start]);

  // ========== DRAWING ==========
  const drawOcean = (ctx, f) => {
    // Sky
    const sky = ctx.createLinearGradient(0, 0, 0, CH * 0.3);
    sky.addColorStop(0, "#4A90D9"); sky.addColorStop(1, "#87CEEB");
    ctx.fillStyle = sky; ctx.fillRect(0, 0, CW, CH * 0.3);
    // Clouds
    ctx.fillStyle = "rgba(255,255,255,0.6)";
    for (let i = 0; i < 4; i++) {
      const cx = ((i * 230 + f * 0.15) % (CW + 100)) - 50;
      const cy = 30 + i * 25;
      ctx.beginPath(); ctx.ellipse(cx, cy, 50 + i * 10, 18, 0, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(cx + 30, cy - 8, 35, 14, 0, 0, Math.PI * 2); ctx.fill();
    }
    // Beach
    const sand = ctx.createLinearGradient(0, CH * 0.28, 0, CH * 0.55);
    sand.addColorStop(0, "#F5DEB3"); sand.addColorStop(0.5, "#DEB887"); sand.addColorStop(1, "#C8A96E");
    ctx.fillStyle = sand; ctx.fillRect(0, CH * 0.28, CW, CH * 0.27);
    // Treeline (雑木林) behind the beach
    const treeBaseY = CH * 0.26;
    // Dark undergrowth strip
    ctx.fillStyle = "#2D5A1E";
    ctx.fillRect(0, treeBaseY + 5, CW, 22);
    // Trees - varied sizes and shades
    const treeDefs = [
      { x: 15, s: 1.1, c: "#3A7D2C" }, { x: 55, s: 0.8, c: "#2E6B22" }, { x: 95, s: 1.2, c: "#4A8E3A" },
      { x: 140, s: 0.7, c: "#336B28" }, { x: 175, s: 1.0, c: "#3D7A2F" }, { x: 220, s: 1.3, c: "#2C5E1F" },
      { x: 265, s: 0.9, c: "#4A8E3A" }, { x: 300, s: 1.1, c: "#357030" }, { x: 340, s: 0.75, c: "#3A7D2C" },
      { x: 380, s: 1.15, c: "#2E6B22" }, { x: 415, s: 0.85, c: "#448535" }, { x: 455, s: 1.25, c: "#2C5E1F" },
      { x: 500, s: 0.95, c: "#3D7A2F" }, { x: 540, s: 1.05, c: "#4A8E3A" }, { x: 575, s: 0.8, c: "#336B28" },
      { x: 615, s: 1.2, c: "#3A7D2C" }, { x: 655, s: 0.9, c: "#2E6B22" }, { x: 690, s: 1.1, c: "#448535" },
      { x: 730, s: 1.3, c: "#2C5E1F" }, { x: 770, s: 0.85, c: "#3D7A2F" }, { x: 800, s: 1.0, c: "#357030" },
    ];
    for (const t of treeDefs) {
      const tw = 28 * t.s;
      const th = 35 * t.s;
      // Trunk
      ctx.fillStyle = "#5C4033";
      ctx.fillRect(t.x - 3, treeBaseY + 5, 6, 18 * t.s);
      // Canopy - layered circles for natural look
      ctx.fillStyle = t.c;
      ctx.beginPath(); ctx.ellipse(t.x, treeBaseY - th * 0.3, tw * 0.5, th * 0.5, 0, 0, Math.PI * 2); ctx.fill();
      // Lighter highlight
      ctx.fillStyle = t.c + "CC";
      ctx.beginPath(); ctx.ellipse(t.x - tw * 0.15, treeBaseY - th * 0.45, tw * 0.3, th * 0.28, 0, 0, Math.PI * 2); ctx.fill();
      // Darker shadow at base of canopy
      ctx.fillStyle = "#1E4A14";
      ctx.beginPath(); ctx.ellipse(t.x, treeBaseY + 2, tw * 0.45, th * 0.15, 0, 0, Math.PI * 2); ctx.fill();
    }
    // Ground cover between trees and beach
    ctx.fillStyle = "#7BA85E";
    ctx.fillRect(0, treeBaseY + 20, CW, 6);
    const grassGrad = ctx.createLinearGradient(0, treeBaseY + 20, 0, treeBaseY + 32);
    grassGrad.addColorStop(0, "rgba(123,168,94,0.6)"); grassGrad.addColorStop(1, "rgba(123,168,94,0)");
    ctx.fillStyle = grassGrad; ctx.fillRect(0, treeBaseY + 20, CW, 12);
    // Sand texture dots
    ctx.fillStyle = "rgba(160,120,60,0.15)";
    for (let i = 0; i < 60; i++) {
      const sx = (i * 137 + 50) % CW;
      const sy = CH * 0.3 + (i * 83) % (CH * 0.22);
      ctx.beginPath(); ctx.arc(sx, sy, 1.5, 0, Math.PI * 2); ctx.fill();
    }
    // Shore foam line
    const shoreY = CH * 0.55;
    ctx.fillStyle = "rgba(255,255,255,0.7)";
    ctx.beginPath();
    for (let x = 0; x <= CW; x += 3) {
      const y = shoreY + Math.sin((x * 0.03) + f * 0.04) * 4 + Math.sin((x * 0.07) + f * 0.06) * 2;
      x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.lineTo(CW, shoreY + 12); ctx.lineTo(0, shoreY + 12); ctx.closePath(); ctx.fill();
    // Shallow water
    const shallow = ctx.createLinearGradient(0, shoreY, 0, shoreY + 60);
    shallow.addColorStop(0, "#7EC8E3"); shallow.addColorStop(1, "#3A9BCD");
    ctx.fillStyle = shallow; ctx.fillRect(0, shoreY + 6, CW, 60);
    // Deep water
    const deep = ctx.createLinearGradient(0, shoreY + 60, 0, CH);
    deep.addColorStop(0, "#2E86C1"); deep.addColorStop(0.5, "#1B6FA0"); deep.addColorStop(1, "#0E4D6F");
    ctx.fillStyle = deep; ctx.fillRect(0, shoreY + 60, CW, CH);
    // Wave layers
    for (let w = 0; w < 4; w++) {
      const wy = shoreY + 30 + w * 40;
      const alpha = 0.25 - w * 0.04;
      ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      for (let x = 0; x <= CW; x += 3) {
        const y = wy + Math.sin((x * 0.02) + f * 0.03 + w * 1.5) * (5 + w * 2)
                     + Math.sin((x * 0.05) + f * 0.05 + w) * 3;
        x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.stroke();
    }
    // Light reflection on water
    ctx.fillStyle = "rgba(255,255,255,0.05)";
    for (let i = 0; i < 15; i++) {
      const rx = (i * 97 + f * 0.3) % CW;
      const ry = shoreY + 70 + (i * 67) % (CH - shoreY - 80);
      const rw = 20 + (i % 4) * 15;
      ctx.fillRect(rx, ry, rw, 2);
    }
  };

  const drawGauge = (ctx) => {
    const gw = 300, gh = 28, gx = CW / 2 - gw / 2, gy = 12;
    const ratio = Math.min(nira.current / MAX_NIRA, 1);
    if (imgs.current.nira) ctx.drawImage(imgs.current.nira, gx - 42, gy - 4, 36, 36);
    ctx.fillStyle = "rgba(0,0,0,0.6)";
    ctx.fillRect(gx, gy, gw, gh);
    const c = ratio > 0.8 ? "#E74C3C" : ratio > 0.5 ? "#F39C12" : "#27AE60";
    ctx.fillStyle = c;
    ctx.fillRect(gx + 2, gy + 2, (gw - 4) * ratio, gh - 4);
    if (ratio > 0.5) {
      ctx.fillStyle = "rgba(255,255,255,0.15)";
      ctx.fillRect(gx + 2, gy + 2, (gw - 4) * ratio, (gh - 4) / 2);
    }
    ctx.strokeStyle = "#fff"; ctx.lineWidth = 2;
    ctx.strokeRect(gx, gy, gw, gh);
    ctx.fillStyle = "#fff"; ctx.font = "bold 15px sans-serif"; ctx.textAlign = "center";
    ctx.fillText(`${nira.current}束 / ${MAX_NIRA}束`, CW / 2, gy + gh + 16);
    ctx.textAlign = "right"; ctx.font = "bold 14px sans-serif";
    ctx.fillText(`撃退: ${defeated.current} / ${BOSS_TRIGGER}`, CW - 16, gy + 20);
  };

  const drawPlayer = (ctx) => {
    const px = player.current.x, py = CH - 55;
    ctx.strokeStyle = "#00FF88"; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(px, py, 16, 0, Math.PI * 2); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(px - 22, py); ctx.lineTo(px - 8, py);
    ctx.moveTo(px + 8, py); ctx.lineTo(px + 22, py);
    ctx.moveTo(px, py - 22); ctx.lineTo(px, py - 8);
    ctx.moveTo(px, py + 8); ctx.lineTo(px, py + 22);
    ctx.stroke();
    ctx.fillStyle = "#00FF88"; ctx.beginPath(); ctx.arc(px, py, 3, 0, Math.PI * 2); ctx.fill();
  };

  const drawEnemy = (ctx, e) => {
    const img = imgs.current.n;
    const w = 80, h = 80;
    if (img) {
      ctx.save();
      if (e.retreating) ctx.globalAlpha = 0.5 + 0.3 * Math.sin(frame.current / 3);
      ctx.drawImage(img, e.x - w / 2, e.y - h / 2, w, h);
      ctx.restore();
    } else {
      ctx.fillStyle = "red"; ctx.fillRect(e.x - 25, e.y - 25, 50, 50);
    }
    if (!e.retreating) {
      const hpR = e.hp / ENEMY_HP;
      ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(e.x - 25, e.y - 45, 50, 5);
      ctx.fillStyle = "#E74C3C"; ctx.fillRect(e.x - 25, e.y - 45, 50 * hpR, 5);
    }
  };

  const drawBossChar = (ctx, b) => {
    const img = imgs.current.b;
    const w = 130, h = 170;
    if (img) ctx.drawImage(img, b.x - w / 2, b.y - h / 2, w, h);
    else { ctx.fillStyle = "purple"; ctx.fillRect(b.x - w / 2, b.y - h / 2, w, h); }
    const r = b.hp / BOSS_HP;
    ctx.fillStyle = "rgba(0,0,0,0.7)"; ctx.fillRect(b.x - 60, b.y - 95, 120, 10);
    ctx.fillStyle = "#8E44AD"; ctx.fillRect(b.x - 60, b.y - 95, 120 * r, 10);
    ctx.strokeStyle = "#fff"; ctx.lineWidth = 1; ctx.strokeRect(b.x - 60, b.y - 95, 120, 10);
    // Boss name
    ctx.fillStyle = "#FFD700"; ctx.font = "bold 13px sans-serif"; ctx.textAlign = "center";
    ctx.fillText("DJ SHIGE【般若】", b.x, b.y - 100);
  };

  const drawBullet = (ctx, b) => {
    if (imgs.current.bullet) {
      const bw = 20, bh = 27;
      ctx.save();
      ctx.translate(b.x, b.y);
      // Slight rotation for dynamic feel
      ctx.rotate(Math.sin(b.y * 0.05) * 0.15);
      ctx.drawImage(imgs.current.bullet, -bw / 2, -bh / 2, bw, bh);
      ctx.restore();
    } else {
      ctx.fillStyle = "rgba(0,191,255,0.7)";
      ctx.beginPath(); ctx.arc(b.x, b.y, 4, 0, Math.PI * 2); ctx.fill();
    }
  };

  const drawNiraPiece = (ctx, np) => {
    if (imgs.current.nira) {
      ctx.save();
      ctx.translate(np.x, np.y);
      ctx.rotate(np.rot);
      ctx.drawImage(imgs.current.nira, -12, -12, 24, 24);
      ctx.restore();
    }
  };

  const drawOceanNiraAll = (ctx, f) => {
    if (!imgs.current.nira) return;
    for (const on of oceanNira.current) {
      ctx.save();
      const bobY = on.y + Math.sin(f * 0.025 + on.phase) * 2.5;
      const bobRot = on.rot + Math.sin(f * 0.015 + on.phase) * 0.1;
      ctx.globalAlpha = 0.85;
      ctx.translate(on.x, bobY);
      ctx.rotate(bobRot);
      const s = on.size;
      ctx.drawImage(imgs.current.nira, -s / 2, -s / 2, s, s);
      ctx.restore();
    }
  };

  const drawWarning = (ctx, f) => {
    if (nira.current >= WARNING_THRESHOLD && nira.current < MAX_NIRA) {
      const a = 0.12 + 0.12 * Math.sin(f / 12);
      ctx.fillStyle = `rgba(255,0,0,${a})`; ctx.fillRect(0, 0, CW, CH);
      ctx.save();
      ctx.fillStyle = "#FF4444"; ctx.font = "bold 60px sans-serif"; ctx.textAlign = "center";
      ctx.globalAlpha = 0.5 + 0.5 * Math.sin(f / 8);
      ctx.fillText("⚠ これには鱈も絶句！ ⚠", CW / 2, CH - 25);
      ctx.restore();
    }
  };

  const drawPause = (ctx) => {
    ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillRect(0, 0, CW, CH);
    ctx.fillStyle = "#fff"; ctx.font = "bold 48px sans-serif"; ctx.textAlign = "center";
    ctx.fillText("PAUSE", CW / 2, CH / 2 - 10);
    ctx.font = "20px sans-serif"; ctx.fillStyle = "#AED6F1";
    ctx.fillText("Pキーで再開", CW / 2, CH / 2 + 30);
  };

  const drawCutscene = (ctx, t) => {
    ctx.fillStyle = "rgba(0,0,0,0.88)"; ctx.fillRect(0, 0, CW, CH);
    if (t > 15 && t < 90) {
      ctx.strokeStyle = "#FFD700"; ctx.lineWidth = 3;
      const w = Math.min(CW, (t - 15) * 15);
      ctx.beginPath(); ctx.moveTo(CW / 2 - w / 2, CH / 2 - 120); ctx.lineTo(CW / 2 + w / 2, CH / 2 - 120); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(CW / 2 - w / 2, CH / 2 + 80); ctx.lineTo(CW / 2 + w / 2, CH / 2 + 80); ctx.stroke();
    }
    if (t > 25 && imgs.current.b) {
      const s = Math.min(1, (t - 25) / 25);
      const w = 140 * s, h = 180 * s;
      ctx.drawImage(imgs.current.b, CW / 2 - w / 2, CH / 2 - h / 2 - 25, w, h);
    }
    if (t > 45) {
      ctx.save();
      ctx.globalAlpha = Math.min(1, (t - 45) / 20);
      ctx.fillStyle = "#FFD700"; ctx.font = "bold 50px sans-serif"; ctx.textAlign = "center";
      ctx.shadowColor = "#FF6600"; ctx.shadowBlur = 20;
      ctx.fillText("ここからが本番だ", CW / 2, CH / 2 + 150);
      ctx.restore();
    }
  };

  const drawTitle = (ctx, f) => {
    drawOcean(ctx, f);
    ctx.fillStyle = "rgba(0,0,0,0.35)"; ctx.fillRect(0, 0, CW, CH);
    // Title image
    if (imgs.current.title) {
      const ti = imgs.current.title;
      const tw = 480, th = ti.height * 480 / ti.width;
      ctx.drawImage(ti, (CW - tw) / 2, 30, tw, th);
    }
    ctx.save(); ctx.shadowColor = "#000"; ctx.shadowBlur = 4;
    ctx.fillStyle = "#E0F0FF"; ctx.font = "bold 15px sans-serif"; ctx.textAlign = "center";
    ctx.fillText("← → : 移動（自動攻撃）　P : ポーズ", CW / 2, 430);
    ctx.restore();
    const a = 0.4 + 0.6 * Math.sin(f / 12);
    ctx.globalAlpha = a;
    ctx.save(); ctx.shadowColor = "#000"; ctx.shadowBlur = 8;
    ctx.fillStyle = "#FFD700"; ctx.font = "bold 30px sans-serif"; ctx.textAlign = "center";
    ctx.fillText("Enterキーでスタート", CW / 2, 520);
    ctx.restore();
    ctx.globalAlpha = 1;
  };

  const drawOver = (ctx) => {
    ctx.fillStyle = "rgba(0,0,0,0.82)"; ctx.fillRect(0, 0, CW, CH);
    ctx.fillStyle = "#E74C3C"; ctx.font = "bold 60px sans-serif"; ctx.textAlign = "center";
    ctx.fillText("GAME OVER", CW / 2, CH / 2 - 30);
    ctx.fillStyle = "#fff"; ctx.font = "22px sans-serif";
    ctx.fillText("と、いうわけでね", CW / 2, CH / 2 + 20);
    ctx.fillStyle = "#AED6F1"; ctx.font = "18px sans-serif";
    ctx.fillText("Enterキーでタイトルに戻る", CW / 2, CH / 2 + 70);
  };

  const drawWin = (ctx, f) => {
    ctx.fillStyle = "rgba(0,0,0,0.55)"; ctx.fillRect(0, 0, CW, CH);
    for (let i = 0; i < 12; i++) {
      const cx = (i * 73 + f * 0.8) % CW;
      const cy = 40 + (i * 53) % 200;
      const r = 3 + Math.abs(Math.sin(f / 4 + i)) * 12;
      ctx.fillStyle = `hsl(${(f * 3 + i * 30) % 360}, 100%, 60%)`;
      ctx.beginPath(); ctx.arc(cx, cy, Math.max(1, r), 0, Math.PI * 2); ctx.fill();
    }
    ctx.save(); ctx.shadowColor = "#FFD700"; ctx.shadowBlur = 25;
    ctx.fillStyle = "#FFD700"; ctx.font = "bold 72px sans-serif"; ctx.textAlign = "center";
    const s = 1 + 0.04 * Math.sin(f / 7);
    ctx.translate(CW / 2, CH / 2 - 30); ctx.scale(s, s);
    ctx.fillText("世界新記録！！", 0, 0);
    ctx.restore();
    ctx.save(); ctx.shadowColor = "#000"; ctx.shadowBlur = 4;
    ctx.fillStyle = "#AED6F1"; ctx.font = "18px sans-serif"; ctx.textAlign = "center";
    ctx.fillText("Enterキーでタイトルに戻る", CW / 2, CH / 2 + 90);
    ctx.restore();
  };

  // ========== GAME LOOP ==========
  useEffect(() => {
    const cv = canvasRef.current;
    if (!cv) return;
    const ctx = cv.getContext("2d");

    const loop = () => {
      frame.current++;
      const f = frame.current;
      const gs = state.current;
      const k = keys.current;
      ctx.clearRect(0, 0, CW, CH);

      if (gs === GS.TITLE) { drawTitle(ctx, f); }
      else if (gs === GS.PLAY || gs === GS.BOSS) {
        if (!paused.current) {
          // Player move
          if (k["ArrowLeft"] || k["a"]) player.current.x = Math.max(20, player.current.x - PLAYER_SPEED);
          if (k["ArrowRight"] || k["d"]) player.current.x = Math.min(CW - 20, player.current.x + PLAYER_SPEED);

          // Auto fire
          if (f % AUTO_FIRE_RATE === 0) {
            bullets.current.push({ x: player.current.x, y: CH - 60 });
          }

          // Update bullets
          bullets.current = bullets.current.map(b => ({ ...b, y: b.y - BULLET_SPEED })).filter(b => b.y > CH * 0.26);

          // Update nira pieces (falling nira → settle in ocean)
          const shoreY = CH * 0.55;
          niraPieces.current = niraPieces.current.map(np => ({
            ...np, y: np.y + 2.5, rot: np.rot + np.rotSpd
          })).filter(np => {
            if (np.y >= shoreY + 20 + Math.random() * 80) {
              // Settle into ocean
              oceanNira.current.push({
                x: np.x + (Math.random() - 0.5) * 20,
                y: np.y + Math.random() * 20,
                rot: np.rot,
                phase: Math.random() * Math.PI * 2,
                size: 16 + Math.random() * 10
              });
              return false;
            }
            return true;
          });
          // Cap ocean nira to prevent performance issues (keep most recent)
          if (oceanNira.current.length > 250) {
            oceanNira.current = oceanNira.current.slice(-250);
          }

          if (gs === GS.PLAY) {
            // Spawn
            spawnT.current++;
            if (spawnT.current >= SPAWN_INTERVAL) {
              spawnT.current = 0;
              enemies.current.push({
                x: 60 + Math.random() * (CW - 120),
                y: CH * 0.15,
                hp: ENEMY_HP,
                retreating: false,
                wobble: Math.random() * Math.PI * 2
              });
            }

            // Update enemies
            enemies.current = enemies.current.map(e => {
              if (e.retreating) return { ...e, y: e.y - 2.5 };
              return {
                ...e,
                y: e.y + ENEMY_SPEED,
                x: e.x + Math.sin(f * 0.02 + e.wobble) * 0.3
              };
            }).filter(e => {
              if (e.retreating && e.y < CH * 0.26) return false;
              if (!e.retreating && e.y > CH * 0.55) {
                nira.current = Math.min(MAX_NIRA, nira.current + NIRA_PER_DUMP);
                audioEngine.playSplash();
                // Spawn nira visual
                for (let i = 0; i < 3; i++) {
                  niraPieces.current.push({
                    x: e.x + (Math.random() - 0.5) * 40,
                    y: e.y,
                    rot: Math.random() * Math.PI * 2,
                    rotSpd: (Math.random() - 0.5) * 0.1
                  });
                }
                e.retreating = true;
                return true;
              }
              return true;
            });

            // Bullet-enemy hit
            bullets.current = bullets.current.filter(b => {
              for (let i = 0; i < enemies.current.length; i++) {
                const e = enemies.current[i];
                if (!e.retreating && Math.abs(b.x - e.x) < 35 && Math.abs(b.y - e.y) < 35) {
                  e.hp--;
                  audioEngine.playBookHit();
                  if (e.hp <= 0) { e.retreating = true; defeated.current++; }
                  return false;
                }
              }
              return true;
            });

            // Boss trigger
            if (defeated.current >= BOSS_TRIGGER && !boss.current) {
              state.current = GS.CUTSCENE; cutT.current = 0; enemies.current = []; audioEngine.playCutscene();
            }
            if (nira.current >= MAX_NIRA) { state.current = GS.OVER; audioEngine.playGameOver(); audioEngine.stopWarning(); }
          }

          if (gs === GS.BOSS && boss.current) {
            const b = boss.current;
            b.x += b.dx;
            b.y = 140 + Math.sin(f / 50) * 30;
            if (b.x < 90 || b.x > CW - 90) b.dx = -b.dx;

            if (f % 100 === 0) {
              nira.current = Math.min(MAX_NIRA, nira.current + NIRA_PER_DUMP);
              audioEngine.playSplash();
              for (let i = 0; i < 5; i++) {
                niraPieces.current.push({
                  x: b.x + (Math.random() - 0.5) * 80,
                  y: b.y + 60,
                  rot: Math.random() * Math.PI * 2,
                  rotSpd: (Math.random() - 0.5) * 0.12
                });
              }
            }

            bullets.current = bullets.current.filter(bl => {
              if (Math.abs(bl.x - b.x) < 60 && Math.abs(bl.y - b.y) < 75) {
                b.hp--;
                audioEngine.playBookHit();
                if (b.hp <= 0) { state.current = GS.WIN; boss.current = null; audioEngine.playWin(); audioEngine.stopWarning(); }
                return false;
              }
              return true;
            });
            if (nira.current >= MAX_NIRA) { state.current = GS.OVER; audioEngine.playGameOver(); audioEngine.stopWarning(); }
          }
        }

        // Draw
        drawOcean(ctx, f);
        drawOceanNiraAll(ctx, f);
        niraPieces.current.forEach(np => drawNiraPiece(ctx, np));
        bullets.current.forEach(b => drawBullet(ctx, b));
        enemies.current.forEach(e => drawEnemy(ctx, e));
        if (gs === GS.BOSS && boss.current) drawBossChar(ctx, boss.current);
        drawPlayer(ctx);
        drawGauge(ctx);
        drawWarning(ctx, f);
        // Warning sound management
        if (nira.current >= WARNING_THRESHOLD && nira.current < MAX_NIRA) {
          audioEngine.startWarning();
        } else {
          audioEngine.stopWarning();
        }
        if (paused.current) drawPause(ctx);
      }
      else if (gs === GS.CUTSCENE) {
        drawOcean(ctx, f);
        if (!paused.current) cutT.current++;
        drawCutscene(ctx, cutT.current);
        if (cutT.current > 140) {
          state.current = GS.BOSS;
          boss.current = { x: CW / 2, y: 140, hp: BOSS_HP, dx: 1.8 };
        }
      }
      else if (gs === GS.OVER) { drawOcean(ctx, f); drawOver(ctx); }
      else if (gs === GS.WIN) { drawOcean(ctx, f); drawOceanNiraAll(ctx, f); drawGauge(ctx); drawWin(ctx, f); }

      raf.current = requestAnimationFrame(loop);
    };
    raf.current = requestAnimationFrame(loop);
    return () => cancelAnimationFrame(raf.current);
  }, []);

  return (
    <div style={{ display: "flex", justifyContent: "center", alignItems: "center", minHeight: "100vh", background: "#060d1f", fontFamily: "sans-serif" }}>
      <div>
        <canvas ref={canvasRef} width={CW} height={CH}
          style={{ border: "3px solid #2A6496", borderRadius: 10, display: "block", background: "#000", boxShadow: "0 0 30px rgba(42,100,150,0.4)" }}
          tabIndex={0} />
        <p style={{ color: "#6BA3C7", textAlign: "center", marginTop: 8, fontSize: 13 }}>
          ← → 移動（自動攻撃）｜ P ポーズ ｜ Enter スタート/リスタート
        </p>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(Game));
</script>
</body>
</html>
